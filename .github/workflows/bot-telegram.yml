# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Bot Runner

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 15 * * *'  # daily 8 AM PST
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push jobs.db back to the repo

    steps:

    - uses: actions/checkout@v4
  
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

    - name: Install Playwright browsers
      run: pwsh bin/Debug/net10.0/playwright.ps1 install chromium

    - name: Run bot
      run: dotnet run --configuration Release
      env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_TOKEN: ${{ secrets.LLM_TOKEN }}

    - name: Commit updated jobs database
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add jobs.db
        # Only commit if jobs.db actually changed
        git diff --cached --quiet || git commit -m "chore: update notified jobs db [skip ci]"
        git push